<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>천안김안과 — 경영 대시보드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#FFFFFF; --sidebar:#F7F7F5; --sidebar-hover:#EFEFED; --sidebar-active:#EDEDEB;
  --text:#37352F; --text-light:#787774; --text-lighter:#B4B4B0;
  --border:#E9E9E7; --accent:#2EAADC;
  --blue:#4A90D9; --green:#0F7B6C; --red:#E03E3E; --yellow:#DFAB01; --orange:#D9730D; --purple:#6940A5;
  --callout:#F1F1EF; --callout-red:#FBE4E4; --callout-yellow:#FBF3DB; --callout-blue:#DDEBF1; --callout-green:#DBEDDB;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);background:var(--bg);}
::-webkit-scrollbar{width:7px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#D4D4D0;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#ADADAD;}

.app{display:flex;height:100vh;overflow:hidden;}

/* ── Sidebar ── */
.sidebar{width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s ease;overflow:hidden;user-select:none;}
.sidebar.collapsed{width:48px;}
.sidebar-header{padding:14px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.sidebar-logo{display:flex;align-items:center;gap:8px;}
.sidebar-logo-icon{width:24px;height:24px;border-radius:4px;background:#2EAADC;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700;}
.sidebar-logo-text{font-size:14px;font-weight:600;white-space:nowrap;}
.sidebar-toggle{background:none;border:none;cursor:pointer;font-size:15px;color:var(--text-light);padding:4px 6px;border-radius:4px;line-height:1;}
.sidebar-toggle:hover{background:var(--sidebar-hover);}
.sidebar-body{flex:1;overflow-y:auto;padding:8px 8px 16px;}
.sidebar-label{padding:8px 8px 4px;font-size:11px;font-weight:600;color:var(--text-lighter);letter-spacing:.04em;}
.sidebar-sublabel{padding:2px 8px 6px;font-size:11px;color:var(--text-lighter);}

.nav-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:1px;border-radius:4px;cursor:pointer;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-light);transition:background .1s;}
.nav-item:hover{background:var(--sidebar-hover);}
.nav-item.active{background:var(--sidebar-active);font-weight:600;color:var(--text);}
.nav-item .icon{font-size:15px;flex-shrink:0;}
.nav-item .new-badge{font-size:9px;background:#E03E3E;color:#fff;padding:1px 5px;border-radius:3px;font-weight:600;flex-shrink:0;}

.fund-toggle{display:flex;align-items:center;gap:8px;padding:6px 10px;margin-top:2px;border-radius:4px;cursor:pointer;font-size:13.5px;color:var(--text-light);}
.fund-toggle:hover{background:var(--sidebar-hover);}
.fund-toggle .arrow{font-size:10px;color:var(--text-lighter);transition:transform .15s;margin-left:auto;}
.fund-toggle .arrow.open{transform:rotate(90deg);}
.fund-children{overflow:hidden;max-height:0;transition:max-height .25s ease;}
.fund-children.open{max-height:400px;}
.fund-child{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 30px;font-size:12.5px;color:var(--text-lighter);cursor:pointer;border-radius:4px;}
.fund-child:hover{background:var(--sidebar-hover);}

.sidebar-divider{height:1px;background:var(--border);margin:12px 8px;}
.sidebar-link{display:flex;align-items:center;gap:8px;padding:5px 10px;font-size:12.5px;color:var(--text-lighter);cursor:pointer;border-radius:4px;}
.sidebar-link:hover{background:var(--sidebar-hover);}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-light);flex-shrink:0;}
.breadcrumb span{color:var(--text-lighter);margin:0 4px;}
.breadcrumb .current{color:var(--text);font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-right .status{background:#DBEDDB;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:500;}

.content-scroll{flex:1;overflow-y:auto;overflow-x:hidden;}
.content{max-width:960px;margin:0 auto;padding:32px 48px 80px;}

/* ── Typography ── */
.page-header{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.page-header .emoji{font-size:32px;}
.page-header h1{font-size:30px;font-weight:700;letter-spacing:-.02em;}
.page-desc{color:var(--text-light);font-size:14px;margin-bottom:24px;}

.section-title{font-size:20px;font-weight:700;margin:32px 0 16px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.sub-title{font-size:16px;font-weight:600;margin:24px 0 12px;}

/* ── Callout ── */
.callout{display:flex;gap:10px;padding:16px 18px;border-radius:4px;background:var(--callout);font-size:14px;line-height:1.65;}
.callout .callout-icon{font-size:20px;flex-shrink:0;}
.callout .callout-body{flex:1;}
.callout-blue{background:var(--callout-blue);}
.callout-red{background:var(--callout-red);}
.callout-yellow{background:var(--callout-yellow);}
.callout-green{background:var(--callout-green);}

/* ── KPI Cards ── */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.kpi-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.kpi-card{background:var(--callout);border-radius:4px;padding:16px 20px;display:flex;flex-direction:column;gap:4px;}
.kpi-card .kpi-label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-light);}
.kpi-card .kpi-value{font-size:26px;font-weight:700;letter-spacing:-.02em;}
.kpi-card .kpi-footer{display:flex;justify-content:space-between;align-items:center;}
.kpi-card .kpi-sub{font-size:12px;color:var(--text-light);}
.kpi-card .kpi-status{font-size:16px;}

/* ── Stat Card ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0;}
.stat-card{border-radius:6px;padding:16px 20px;text-align:center;}
.stat-card .stat-icon{font-size:12px;color:var(--text-light);margin-bottom:4px;}
.stat-card .stat-value{font-size:28px;font-weight:700;}
.stat-card .stat-value span{font-size:14px;font-weight:400;color:var(--text-light);}
.stat-card .stat-sub{font-size:13px;font-weight:600;margin-top:2px;}

/* ── Table ── */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:4px;font-size:13px;}
.table-wrap table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;}
.table-wrap th{padding:8px 12px;background:var(--callout);border-bottom:1px solid var(--border);font-weight:600;text-align:center;white-space:nowrap;font-size:12px;color:var(--text-light);}
.table-wrap td{padding:7px 12px;border-bottom:1px solid var(--border);text-align:center;font-size:12.5px;}
.table-wrap tr:last-child td{border-bottom:none;}

/* ── Daily Report Table ── */
.daily-table{overflow-x:auto;border:1px solid var(--border);border-radius:4px;}
.daily-table table{width:100%;border-collapse:collapse;}
.daily-table th{padding:8px 8px;border-bottom:2px solid var(--border);font-weight:600;text-align:center;font-size:11.5px;background:#E8EDF3;}
.daily-table th.sticky{position:sticky;left:0;z-index:1;background:#E8EDF3;min-width:90px;font-size:12px;font-weight:700;}
.daily-table th.sum-col{background:#D9E2F3;font-weight:700;min-width:62px;font-size:12px;}
.daily-table td{padding:5px 8px;border-bottom:1px solid var(--border);text-align:center;font-size:11.5px;}
.daily-table td.sticky{position:sticky;left:0;z-index:1;background:#fff;font-weight:500;font-size:11.5px;white-space:nowrap;text-align:left;padding-left:10px;}
.daily-table td.sum-td{background:#F0F4FA;font-weight:700;font-size:12px;}
.daily-table tr.header-row td{background:#F7F6F3;font-weight:600;}
.daily-table tr.header-row td.sticky{background:#F7F6F3;font-weight:700;}
.daily-table tr.sep-row td{height:2px;padding:0;background:var(--border);}

/* ── Chart Container ── */
.chart-box{position:relative;width:100%;}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:8px;}
.chart-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

/* ── Doctor Cards Grid ── */
.doc-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.doc-card{background:var(--callout);border-radius:4px;padding:14px 16px;}
.doc-card .doc-name{font-size:13px;font-weight:600;margin-bottom:8px;}
.doc-card .doc-stat{font-size:11px;color:var(--text-light);line-height:1.8;}
.doc-card .doc-stat strong{color:var(--text);}

/* ── Funnel ── */
.funnel{display:flex;gap:0;margin:16px 0;}
.funnel-step{flex:1;position:relative;text-align:center;padding:18px 16px;border-radius:0;}
.funnel-step:first-child{border-radius:6px 0 0 6px;}
.funnel-step:last-child{border-radius:0 6px 6px 0;}
.funnel-step .funnel-icon{font-size:20px;}
.funnel-step .funnel-label{font-size:12px;color:var(--text-light);margin:4px 0;}
.funnel-step .funnel-value{font-size:20px;font-weight:700;}
.funnel-arrow{position:absolute;right:-8px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-light);z-index:1;}

/* ── Toggle / Details ── */
.toggle-block{cursor:pointer;margin-top:8px;}
.toggle-block summary{font-weight:600;list-style:none;padding:6px 0;}
.toggle-block summary::-webkit-details-marker{display:none;}
.toggle-block .toggle-content{margin-top:8px;padding-left:8px;border-left:2px solid var(--yellow);line-height:1.7;font-size:13px;}

/* ── Animations ── */
.page{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ── Responsive ── */
@media(max-width:900px){
  .sidebar{width:48px!important;}
  .sidebar .sidebar-body,.sidebar .sidebar-logo{display:none;}
  .content{padding:24px 16px 60px;}
  .kpi-grid,.kpi-grid-4{grid-template-columns:repeat(2,1fr);}
  .chart-row{grid-template-columns:1fr;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .doc-cards{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

// ── Build sidebar nav ──
function buildNav(){
  const nav = document.getElementById("navItems");
  nav.innerHTML = PAGES.map(p=>`
    <div class="nav-item${p.id===currentPage?' active':''}" data-page="${p.id}">
      <span class="icon">${p.icon}</span>
      <span>${p.label}</span>
      ${p.isNew?'<span class="new-badge">NEW</span>':''}
    </div>
  `).join("");
  nav.querySelectorAll(".nav-item").forEach(el=>{
    el.addEventListener("click",()=>navigate(el.dataset.page));
  });

  const fc = document.getElementById("fundChildren");
  fc.innerHTML = FUND_PAGES.map(p=>`<div class="fund-child"><span>${p.icon}</span> ${p.label}</div>`).join("");
}

function navigate(pageId){
  currentPage = pageId;
  document.querySelectorAll(".nav-item").forEach(el=>{
    el.classList.toggle("active", el.dataset.page===pageId);
  });
  const pg = PAGES.find(p=>p.id===pageId);
  document.getElementById("breadcrumbCurrent").textContent = `${pg.icon} ${pg.label}`;
  document.getElementById("contentScroll").scrollTop = 0;
  destroyCharts();
  renderPage(pageId);
}

function h(tag,attrs,children){
  let s = `<${tag}`;
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{ if(k==='style'&&typeof v==='object') s+=` style="${Object.entries(v).map(([a,b])=>`${a.replace(/[A-Z]/g,m=>'-'+m.toLowerCase())}:${b}`).join(';')}"`; else s+=` ${k}="${v}"`; });
  if(children===undefined||children===null) return s+'/>';
  return s+'>'+children+'</'+tag+'>';
}
